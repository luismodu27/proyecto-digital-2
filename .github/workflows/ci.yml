name: CI

# Puerta de calidad: como el proyecto no tiene tests, la verificación es
# lint + typecheck + build (lo que dice CLAUDE.md). Corre en cada PR y en los
# push a main para que ninguna regresión de lint/tipos/build llegue a producción.
on:
  pull_request:
  push:
    branches: [main]

# Cancela ejecuciones antiguas de la misma rama/PR si llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      # Build sin credenciales → modo demo (self-contained, sin red). Verifica que
      # el bundle compila. El build real de producción lo hace Vercel con las vars
      # NEXT_PUBLIC_* reales; aquí solo comprobamos que no hay errores de build.
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
