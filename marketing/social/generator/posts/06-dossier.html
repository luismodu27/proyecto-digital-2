<!doctype html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../brand.css">
<style>
  .stage{flex:1 1 auto;display:flex;align-items:center;justify-content:center;position:relative}
  .doc-shadow{filter:drop-shadow(0 40px 60px rgba(15,26,20,.14)) drop-shadow(0 8px 16px rgba(15,26,20,.08))}
</style></head>
<body>
<div class="canvas">
  <div class="frame">

    <div class="brandbar">
      <div class="brandmark"><span class="seal"></span><span class="wordmark">Attesta</span></div>
      <span class="kicker">Evidencia lista</span>
    </div>

    <div class="headline mt-l" style="max-width:900px">
      Cuando llegue el auditor, <span class="em">¿tendrás la evidencia lista</span> o empezarás a buscarla?
    </div>

    <div class="stage">
      <svg width="600" height="520" viewBox="0 0 600 520" class="doc-shadow" xmlns="http://www.w3.org/2000/svg">
        <!-- back page -->
        <rect x="70" y="40" width="440" height="450" rx="14" fill="#ffffff" stroke="#e6e1d4" stroke-width="2" transform="rotate(-3 290 265)"/>
        <!-- main page -->
        <rect x="60" y="30" width="460" height="470" rx="16" fill="#ffffff" stroke="#d6d0bf" stroke-width="2"/>
        <!-- header band -->
        <rect x="60" y="30" width="460" height="96" rx="16" fill="#0b6b4e"/>
        <rect x="60" y="110" width="460" height="16" fill="#0b6b4e"/>
        <circle cx="112" cy="78" r="24" fill="none" stroke="#faf8f2" stroke-width="2.5"/>
        <path d="M101 78 l8 8 l14 -18" fill="none" stroke="#faf8f2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="152" y="64" width="150" height="12" rx="6" fill="#faf8f2"/>
        <rect x="152" y="86" width="96" height="9" rx="4.5" fill="#7fd8b4"/>
        <!-- risk pill -->
        <rect x="392" y="62" width="100" height="34" rx="17" fill="#c9761f"/>
        <text x="442" y="84" font-family="Geist Mono, monospace" font-size="15" letter-spacing="1.5" fill="#fff" text-anchor="middle">ALTO</text>
        <!-- body lines -->
        <g fill="#e6e1d4">
          <rect x="96" y="170" width="360" height="11" rx="5.5"/>
          <rect x="96" y="196" width="320" height="11" rx="5.5"/>
          <rect x="96" y="222" width="344" height="11" rx="5.5"/>
        </g>
        <!-- section: obligaciones -->
        <rect x="96" y="264" width="120" height="10" rx="5" fill="#b0824a"/>
        <g fill="#eef0ea">
          <rect x="96" y="292" width="384" height="30" rx="8"/>
          <rect x="96" y="330" width="384" height="30" rx="8"/>
          <rect x="96" y="368" width="384" height="30" rx="8"/>
        </g>
        <g fill="#0b6b4e">
          <circle cx="114" cy="307" r="7"/><circle cx="114" cy="345" r="7"/><circle cx="114" cy="383" r="7"/>
        </g>
        <g fill="#cfe3d8">
          <rect x="134" y="302" width="240" height="10" rx="5"/>
          <rect x="134" y="340" width="210" height="10" rx="5"/>
          <rect x="134" y="378" width="256" height="10" rx="5"/>
        </g>
        <!-- footer of doc: seal + signature line -->
        <rect x="96" y="430" width="180" height="9" rx="4.5" fill="#e6e1d4"/>
        <circle cx="468" cy="440" r="30" fill="none" stroke="#b0824a" stroke-width="2"/>
        <path d="M454 440 l9 9 l17 -21" fill="none" stroke="#b0824a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <hr class="rule">
    <div class="lead mt-m" style="max-width:900px">
      Un <b>dossier de gobernanza</b> por sistema —clasificación, obligaciones, brechas, plan y
      <b>registro inmutable</b>— en PDF, con un clic.
    </div>

    <div class="footer mt-l">
      <span class="handle">@attesta.io</span>
      <span class="footnote">Preparación para auditoría</span>
    </div>

  </div>
</div>
</body></html>
