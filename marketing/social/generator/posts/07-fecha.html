<!doctype html><html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../brand.css">
<style>
  .date{font-family:"Fraunces",serif;font-weight:600;line-height:.92;letter-spacing:-.02em;color:var(--brand-strong)}
  .date .d{font-size:230px;display:block}
  .date .my{font-size:96px;color:var(--ink);display:flex;align-items:baseline;gap:26px;margin-top:6px}
  .date .my .mo{color:var(--seal)}
  .shift{display:inline-flex;align-items:center;gap:16px;font-family:"Geist Mono",monospace;font-size:18px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .shift .arrow{color:var(--brand-strong)}
  .shift .old{text-decoration:line-through;text-decoration-color:var(--seal);opacity:.75}
</style></head>
<body>
<div class="canvas dark">
  <div class="frame">
    <div class="brandbar">
      <div class="brandmark"><span class="seal"></span><span class="wordmark">Attesta</span></div>
      <span class="kicker">Fecha clave</span>
    </div>

    <div class="spacer"></div>

    <div class="date">
      <span class="d">2 DIC</span>
      <span class="my"><span>2027</span></span>
    </div>

    <div class="shift mt-l">
      <span class="old">Ago 2026</span><span class="arrow">→</span><span>2 dic 2027</span>
    </div>

    <div class="spacer"></div>

    <hr class="rule">
    <div class="lead mt-m" style="max-width:900px;color:var(--ink)">
      Nueva fecha límite para las obligaciones de IA de <b>alto riesgo (Anexo III)</b>, tras el Digital Omnibus.
    </div>
    <div class="small mt-m" style="max-width:860px">
      ¿La buena noticia? Tienes más tiempo para prepararte <span class="serif" style="font-style:italic;color:var(--brand-strong)">bien</span>. No lo desperdicies.
    </div>

    <div class="footer mt-l">
      <span class="handle">@attesta.io</span>
      <span class="footnote">Educación regulatoria</span>
    </div>
  </div>
</div>
</body></html>
